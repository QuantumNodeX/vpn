<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>注册量子账户</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta http-equiv="Access-Control-Allow-Origin" content="*">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-title" content="量子VPN">
    <meta name="theme-color" content="#ffffff">
    <meta name="format-detection" content="telephone=no">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./lib/layui-v2.6.7/css/layui.css" media="all">
    <link rel="stylesheet" href="./css/public.css" media="all">
    <link rel="stylesheet" href="./css/theme-tech.css" media="all">
    <link rel="apple-touch-icon" sizes="108x108" href="./images/icon-cp.png">
    <link rel="icon" href="./favicon.ico">
    <!--[if lt IE 9]>
    <script src="https://cdn.staticfile.org/html5shiv/r29/html5.min.js"></script>
    <script src="https://cdn.staticfile.org/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .register-page {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .register-card {
            width: 100%;
            max-width: 440px;
            padding: 38px 32px 32px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(123, 47, 242, 0.12);
            box-shadow: 0 24px 80px rgba(71, 32, 133, 0.12);
            text-align: center;
        }

        .register-logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 18px;
            border-radius: 22px;
            background: linear-gradient(135deg, #7b2ff2 0%, #9855ff 100%);
            box-shadow: 0 18px 38px rgba(123, 47, 242, 0.24);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-logo img {
            width: 42px;
            height: 42px;
        }

        .register-card h1 {
            margin: 0;
            font-size: 28px;
            line-height: 1.35;
            color: #111111;
        }

        .register-card p {
            margin: 18px 0 0;
            font-size: 15px;
            line-height: 1.8;
            color: #6f6a83;
        }

        .register-actions {
            margin-top: 30px;
        }

        .register-actions a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 48px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .register-actions a:hover {
            transform: translateY(-1px);
        }

        .register-actions .primary {
            color: #ffffff;
            background: linear-gradient(135deg, #7b2ff2 0%, #5b16c7 100%);
            box-shadow: 0 14px 30px rgba(123, 47, 242, 0.18);
        }

        .register-actions .secondary {
            margin-top: 14px;
            color: #7b2ff2;
            background: rgba(123, 47, 242, 0.08);
            border: 1px solid rgba(123, 47, 242, 0.16);
        }

        @media (max-width: 480px) {
            .register-page {
                padding: 18px;
            }

            .register-card {
                padding: 32px 22px 24px;
                border-radius: 20px;
            }

            .register-card h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="register-page">
        <div class="register-card">
            <div class="register-logo">
                <img src="./images/icon-cp.png" alt="量子VPN">
            </div>
            <h1>注册量子账户</h1>
            <p>暂时不支持在网站上注册账户，请您在客户端中进行注册，如果没有客户端请返回官网首页下载。</p>
            <div class="register-actions">
                <a id="home-link" class="primary" href="../index.html">返回官网</a>
                <a id="login-link" class="secondary" href="./login.html">已有账号去登录</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var currentUrl = window.location.href;
            var query = window.location.search || "";
            document.getElementById("home-link").href = currentUrl.replace("web/register.html", "");
            document.getElementById("login-link").href = "./login.html" + query;
        })();
    </script>
</body>

</html>
